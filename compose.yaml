services:
  autopoiesis:
    build: .
    init: true
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      AUTOPOIESIS_BACKEND_PATH: /app/build/autopoiesis_backend
      AUTOPOIESIS_DATA_DIR: /data
      AUTOPOIESIS_BACKEND_RESTART: ${AUTOPOIESIS_BACKEND_RESTART:-1}
      AUTOPOIESIS_WEB_SNAPSHOT_MS: ${AUTOPOIESIS_WEB_SNAPSHOT_MS:-100}
      AUTOPOIESIS_SAFE_PREVIEW: ${AUTOPOIESIS_SAFE_PREVIEW:-0}
      LLM_API_KEY: ${LLM_API_KEY:-}
      USE_API: ${USE_API:-1}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LIMIT_LLM_API_CALLS: ${LIMIT_LLM_API_CALLS:-100}
      LLM_API_TIMEOUT_SECONDS: ${LLM_API_TIMEOUT_SECONDS:-120}
      AUTOPOIESIS_RUN_ID: ${AUTOPOIESIS_RUN_ID:-}
      REPORT_EVERY_DAYS: ${REPORT_EVERY_DAYS:-3}
      CYCLES_PER_DAY: ${CYCLES_PER_DAY:-2400}
      DEVIL_CHANCE_ONE_IN: ${DEVIL_CHANCE_ONE_IN:-10}
      DEVIL_AUTO_APPROVE: ${DEVIL_AUTO_APPROVE:-0}
      WAIT_FOR_HUMAN_VALIDATION: ${WAIT_FOR_HUMAN_VALIDATION:-1}
      SIMULATION_DAYS: ${SIMULATION_DAYS:-100}
      SIMULATION_DELAY_MS: ${SIMULATION_DELAY_MS:-500}
      SIMULATION_RENDER_EVERY_DAYS: ${SIMULATION_RENDER_EVERY_DAYS:-1}
      GOD_QUEUE_TIMEOUT_SECONDS: ${GOD_QUEUE_TIMEOUT_SECONDS:-900}
      GOD_WAIT_TIMEOUT_SECONDS: ${GOD_WAIT_TIMEOUT_SECONDS:-900}
      GOD_MAX_CORRECTIONS: ${GOD_MAX_CORRECTIONS:-2}
    volumes:
      - ./data:/data
