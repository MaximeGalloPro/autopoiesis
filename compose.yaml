services:
  autopoiesis:
    build: .
    environment:
      LLM_API_KEY: ${LLM_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      LIMIT_LLM_API_CALLS: ${LIMIT_LLM_API_CALLS:-100}
      AUTOPOIESIS_RUN_ID: ${AUTOPOIESIS_RUN_ID:-}
      REPORT_EVERY_CYCLES: ${REPORT_EVERY_CYCLES:-1}
      FEATURE_REQUESTS_REQUIRED: ${FEATURE_REQUESTS_REQUIRED:-1}
      SIMULATION_DELAY_MS: ${SIMULATION_DELAY_MS:-500}
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
